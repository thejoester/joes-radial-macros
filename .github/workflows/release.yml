name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version From Tag
        id: get_version
        run: echo "version-without-v=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Use tagged manifest for prerelease; latest for stable
      - name: Set manifest URL for channel (stable vs prerelease)
        id: set_manifest
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "manifest_url=https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.json" >> $GITHUB_OUTPUT
          else
            echo "manifest_url=https://github.com/${{ github.repository }}/releases/latest/download/module.json" >> $GITHUB_OUTPUT
          fi

      - name: Modify Module Manifest With Release-Specific Values
        id: sub_manifest_link_version
        uses: microsoft/variable-substitution@v1
        with:
          files: "module.json"
        env:
          version: ${{ steps.get_version.outputs.version-without-v }}
          manifest: ${{ steps.set_manifest.outputs.manifest_url }}
          download: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/joes-radial-macros.zip

      - name: Create Module Archive
        run: |
          mkdir -p dist
          FILES="module.json scripts/ styles/ lang/ assets/"
          [ -f LICENSE ] && FILES="$FILES LICENSE"
          [ -f README.md ] && FILES="$FILES README.md"
          [ -f CHANGELOG.md ] && FILES="$FILES CHANGELOG.md"
          zip -r dist/joes-radial-macros.zip $FILES

      # --- Build the release body from CHANGELOG.md -------------------------

      - uses: release-flow/keep-a-changelog-action@v3
        id: changelog
        with:
          command: query
          version: ${{ steps.get_version.outputs.version-without-v }}

      - name: Build release body
        id: build_body
        env:
          CHANGELOG_NOTES: ${{ steps.changelog.outputs.release-notes }}
          MANIFEST_URL: ${{ steps.set_manifest.outputs.manifest_url }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          {
            echo 'body<<BODYEOF'
            if [ "$IS_PRERELEASE" = "true" ]; then
              echo '> [!CAUTION]'
              echo '> This is a test release, please test in a test world or make a backup before testing!'
              echo '>'
              echo "To install this test release use the manifest url \`$MANIFEST_URL\`."
              echo ''
            fi
            echo "$CHANGELOG_NOTES"
            echo 'BODYEOF'
          } >> $GITHUB_OUTPUT

      # --- Publish ----------------------------------------------------------

      - name: Update Release With Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: ${{ github.event.release.draft }}
          prerelease: ${{ github.event.release.prerelease }}
          name: ${{ steps.get_version.outputs.version-without-v }}
          body: ${{ steps.build_body.outputs.body }}
          artifacts: "module.json, dist/joes-radial-macros.zip"
